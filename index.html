<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}

.container {
    display: flex;
    gap: 20px;
    margin-top: 20px;
}

.version {
    flex: 1;
    border: 1px solid #ccc;
    padding: 15px;
    white-space: pre-wrap;
    background: #fafafa;
    min-height: 300px;
}

h3 {
    margin-top: 0;
    border-bottom: 2px solid #333;
    padding-bottom: 10px;
}

.deleted {
    background-color: #ffcccc;
    color: #cc0000;
    text-decoration: line-through;
    font-weight: bold;
}

.added {
    background-color: #ccffcc;
    color: #006600;
    font-weight: bold;
}

input, button {
    margin: 5px 0;
}
</style>

</head>

<body>

<h2>Comparación de Archivos</h2>

<!-- UPLOAD SECTION -->
<input type="file" id="file1">
<input type="file" id="file2">
<button onclick="compare()">Comparar</button>

<div class="container">
    <div class="version" id="output1">
        <h3>Versión 1</h3>
    </div>

    <div class="version" id="output2">
        <h3>Versión 2</h3>
    </div>
</div>

<script>
function readFile(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsText(file);
    });
}

async function compare() {
    const file1 = document.getElementById("file1").files[0];
    const file2 = document.getElementById("file2").files[0];

    if (!file1 || !file2) {
        alert("Please upload both files");
        return;
    }

    const text1 = await readFile(file1);
    const text2 = await readFile(file2);

    document.getElementById("output1").innerText = text1;
    document.getElementById("output2").innerText = text2;
}
</script>

</body>
</html>
